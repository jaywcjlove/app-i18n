name: 🌍 [App i18n] - 语言请求
description: "请求在 App i18n 中支持新的语言。"
title: '🌍 语言请求: [语言名称]'
labels: ['enhancement', 'language', 'i18n']
assignees:
  - jaywcjlove

body:
  - type: markdown
    attributes:
      value: |
        请提供您希望请求支持的语言的详细信息。
        
        App i18n 是一个轻量级命令行工具，用于统一管理和优化多个 App 的国际化（i18n）流程。
        
        ### 联系信息

        如果您对语言支持有任何疑问，请随时通过以下方式联系我们：

        - **电子邮件支持**: [kennyiseeyou@gmail.com](mailto:kennyiseeyou@gmail.com)
        - **社交媒体**: [Twitter](https://twitter.com/jaywcjlove)

  - type: dropdown
    attributes:
      label: 🌍 语言
      description: 您希望请求支持哪种语言？
      options:
        - Arabic (ar)
        - Bulgarian (bg)
        - Catalan (ca)
        - Czech (cs)
        - Danish (da)
        - German (de)
        - Greek (el)
        - English (en)
        - English (Australia) (en-AU)
        - English (Canada) (en-CA)
        - English (United Kingdom) (en-GB)
        - English (United States) (en-US)
        - Spanish (es)
        - Spanish (Latin America) (es-419)
        - Estonian (et)
        - Finnish (fi)
        - French (fr)
        - French (Canada) (fr-CA)
        - Hebrew (he)
        - Hindi (hi)
        - Croatian (hr)
        - Hungarian (hu)
        - Indonesian (id)
        - Italian (it)
        - Japanese (ja)
        - Korean (ko)
        - Lithuanian (lt)
        - Latvian (lv)
        - Malay (ms)
        - Norwegian Bokmål (nb)
        - Dutch (nl)
        - Polish (pl)
        - Portuguese (pt)
        - Portuguese (Brazil) (pt-BR)
        - Portuguese (Portugal) (pt-PT)
        - Romanian (ro)
        - Russian (ru)
        - Slovak (sk)
        - Slovenian (sl)
        - Serbian (sr)
        - Serbian (Latin) (sr-Latn)
        - Swedish (sv)
        - Thai (th)
        - Turkish (tr)
        - Ukrainian (uk)
        - Vietnamese (vi)
        - Chinese, Simplified (zh-Hans)
        - Chinese, Traditional (zh-Hant)
    validations:
      required: true

  - type: dropdown
    attributes:
      label: 🎯 目标应用
      description: 您需要为哪个（些）应用添加此语言？
      options:
        - 所有应用
        - audioer
        - daybar
        - devhub
        - iconed
        - keyzer
        - menuist
        - musicer
        - quickrss
        - regexmate
        - scap
        - 其他（请在附加说明中指定）
      multiple: true
    validations:
      required: true

  - type: textarea
    attributes:
      label: ℹ️ 补充说明
      description: 关于此语言请求的任何附加信息。
      placeholder: 例如：地区差异、文化考虑因素、现有翻译资源等。
    validations:
      required: false