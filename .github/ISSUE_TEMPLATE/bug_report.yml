name: рЯЩЛвАНвЩВпЄП [App i18n] - Support & Feedback
description: Get help with App i18n, report bugs, or request features.
title: 'рЯЩЛвАНвЩВпЄП Support & Feedback: App i18n'
labels: ['support', 'feedback', 'question']
assignees:
  - jaywcjlove
body:
  - type: markdown
    attributes:
      value: |
        Please provide as much detail as possible about your support request or feedback.
        
        App i18n is a lightweight CLI tool for unifying and optimizing the internationalization (i18n) workflow across multiple apps.
        
        **Core Capabilities**:
        - рЯФБ Bidirectional conversion: `.xcstrings` вЗД `.lproj`
        - рЯ§Ц `.lproj` structure better suited for AI batch translation
        - рЯС• Facilitates multi-person Git collaborative maintenance
        - рЯУ¶ Supports unified management of localization files for multiple apps
        - вЪ° CLI-first, easy to script and integrate with CI/CD

        ### Contact Information

        If you encounter any issues or need support while using our app, please feel free to contact us through the following methods:

        - **Email Support**: [kennyiseeyou@gmail.com](mailto:kennyiseeyou@gmail.com)
        - **Social Media**: [Twitter](https://twitter.com/jaywcjlove)

        We will respond to your message as soon as possible. Thank you for your support of our app!

  - type: textarea
    attributes:
      label: рЯЩЛвАНвЩВпЄП How can we help you?
      description: Describe the issue you're facing or the feature you'd like to request.
      placeholder: For example, I'm experiencing an issue with...
    validations:
      required: true

  - type: dropdown
    id: os_version
    attributes:
      label: "рЯТї Operating System"
      description: Your operating system and version.
      options:
        - macOS 15.x (Sequoia)
        - macOS 14.x (Sonoma)
        - macOS 13.x (Ventura)
        - macOS 12.x (Monterey)
        - Linux
        - Other
      default: 0
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        **How can I send you a crash report for one of your apps?**

        - macOS Open Finder
        - Select Go to **FolderвА¶** from the Go menu <kbd>вЗІ</kbd> + <kbd>вМШ</kbd> + <kbd>G</kbd>
        - Enter: **~/Library/Logs/DiagnosticReports**
        - In the resulting list, select all files that starts with the app name, ZIP them, and send me
        - Attach the file to this issue

  - type: textarea
    attributes:
      label: вДєпЄП Additional context
      description: Add any additional information that could be helpful.
      placeholder: ex. Screenshots, steps to reproduce, etc.
    validations:
      required: false